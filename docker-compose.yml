services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: identity_lifecycle
      POSTGRES_USER: identity
      POSTGRES_PASSWORD: identity
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity -d identity_lifecycle"]
      interval: 2s
      timeout: 2s
      retries: 15

volumes:
  pgdata:
